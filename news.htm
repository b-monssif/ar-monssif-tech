<!DOCTYPE html>
<html lang="ar" dir="rtl" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفاصيل الخبر | منصف تيك</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        body { 
            background-color: #ffffff; 
            color: #0f172a; 
            font-family: 'Cairo', sans-serif; 
            line-height: 1.7;
        }

        .nav-standard {
            position: fixed; top: 0; width: 100%; z-index: 100;
            background: white; border-bottom: 1px solid #edf2f7;
        }

        .logo-container { display: flex; align-items: center; gap: 10px; }
        .logo-icon { background: #2563eb; color: white; padding: 6px; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
        .logo-text { font-size: 1.4rem; font-weight: 900; color: #0f172a; }
        .logo-text span { color: #2563eb; }

        .main-title {
            font-size: 2.5rem;
            font-weight: 900;
            line-height: 1.45;
            color: #0f172a;
            letter-spacing: -0.5px;
        }

        .article-content p {
            margin-bottom: 1.5rem;
            font-size: 1.1rem;
            color: #334155;
            text-align: justify;
        }

        .article-hero-img {
            width: 100%;
            height: 45vh;
            overflow: hidden;
            border-radius: 2rem;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
        }

        @media (max-width: 768px) {
            .main-title { font-size: 1.8rem; }
        }
    </style>
</head>
<body class="antialiased pt-24">

    <nav class="nav-standard">
        <div class="max-w-5xl mx-auto px-6 h-20 flex justify-between items-center">
            <a href="index.htm" class="logo-container">
                <div class="logo-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6"/><line x1="9" y1="1" x2="9" y2="4"/><line x1="15" y1="1" x2="15" y2="4"/><line x1="9" y1="20" x2="9" y2="23"/><line x1="15" y1="20" x2="15" y2="23"/><line x1="20" y1="9" x2="23" y2="9"/><line x1="20" y1="15" x2="23" y2="15"/><line x1="1" y1="9" x2="4" y2="9"/><line x1="1" y1="15" x2="4" y2="15"/></svg>
                </div>
                <div class="logo-text">منصف <span>تك</span></div>
            </a>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-6 mt-12 mb-24">
        
        <nav class="flex items-center gap-2 text-xs text-slate-400 mb-6 font-bold uppercase tracking-widest">
            <a href="index.htm" class="hover:text-blue-600">الرئيسية</a>
            <i class="fa-solid fa-chevron-left text-[8px]"></i>
            <span id="article-category" class="text-blue-600">الأخبار</span>
        </nav>

        <header class="mb-10">
            <span id="article-badge" class="bg-blue-100 text-blue-700 text-[11px] font-black px-3 py-1 rounded-md uppercase">تحميل...</span>
            <h1 id="article-title" class="main-title mt-4 mb-6 italic text-slate-300">جاري تحميل الخبر...</h1>
            
            <div class="flex items-center gap-4 text-slate-400 text-xs border-t pt-6 border-slate-100">
                <div class="flex items-center gap-2">
                    <i class="fa-regular fa-calendar"></i>
                    <span id="article-date">-- -- 2026</span>
                </div>
                <div class="flex items-center gap-2">
                    <i class="fa-regular fa-clock"></i>
                    <span>4 دقائق للقراءة</span>
                </div>
            </div>
        </header>

        <div class="article-hero-img mb-12">
            <img id="article-image" src="" class="w-full h-full object-cover shadow-inner">
        </div>

        <article id="article-body" class="article-content">
            </article>

        <section class="mt-16 pt-8 border-t border-slate-100 flex justify-between items-center">
            <span class="text-sm font-bold text-slate-400 uppercase">مشاركة الخبر</span>
            <div class="flex gap-3">
                <a href="#" class="w-9 h-9 rounded-lg bg-slate-100 text-slate-600 flex items-center justify-center hover:bg-blue-600 hover:text-white transition-all"><i class="fa-brands fa-facebook-f"></i></a>
                <a href="#" class="w-9 h-9 rounded-lg bg-slate-100 text-slate-600 flex items-center justify-center hover:bg-black hover:text-white transition-all"><i class="fa-brands fa-x-twitter"></i></a>
                <a href="#" class="w-9 h-9 rounded-lg bg-slate-100 text-slate-600 flex items-center justify-center hover:bg-green-500 hover:text-white transition-all"><i class="fa-brands fa-whatsapp"></i></a>
            </div>
        </section>

    </main>

    <footer class="py-12 bg-slate-50 border-t border-slate-100">
        <div class="max-w-5xl mx-auto px-6 text-center">
            <div class="logo-container justify-center mb-4 opacity-50">
                <div class="logo-text">منصف <span>تك</span></div>
            </div>
            <p class="text-[10px] font-bold text-slate-400">© 2026 MONSSIF-TECH</p>
        </div>
    </footer>

    <script>
        // CONFIGURATION SANITY
        const PROJECT_ID = "tb7z1hn9"; 
        const DATASET = "production";
        
        async function loadArticle() {
            const id = new URLSearchParams(window.location.search).get('id');
            if(!id) return;

            const QUERY = encodeURIComponent(`*[_type == "post" && _id == "${id}"][0]{
                title,
                "imageUrl": mainImage.asset->url,
                "cat": categories[0],
                publishedAt,
                body
            }`);

            const URL = `https://${PROJECT_ID}.api.sanity.io/v2021-10-21/data/query/${DATASET}?query=${QUERY}`;

            try {
                const res = await fetch(URL);
                const { result } = await res.json();

                if (result) {
                    document.getElementById('article-title').innerText = result.title;
                    document.getElementById('article-title').classList.remove('italic', 'text-slate-300');
                    document.getElementById('article-badge').innerText = result.cat || 'تكنولوجيا';
                    document.getElementById('article-category').innerText = result.cat || 'تكنولوجيا';
                    document.getElementById('article-image').src = result.imageUrl;
                    
                    const date = new Date(result.publishedAt);
                    document.getElementById('article-date').innerText = date.toLocaleDateString('ar-EG', { day:'numeric', month:'long', year:'numeric' });

                    document.getElementById('article-body').innerHTML = result.body.map(block => {
                        return block._type === 'block' ? `<p>${block.children.map(c => c.text).join('')}</p>` : '';
                    }).join('');
                }
            } catch (e) { console.error(e); }
        }
        window.onload = loadArticle;
    </script>
</body>
</html>
